<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Edson Neiva – Holograma</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #FFD700;
      --gold-light: #FFF5A0;
      --gold-dark:  #B8860B;
      --gold-glow:  rgba(255, 215, 0, 0.55);
      --gold-dim:   rgba(255, 215, 0, 0.18);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Raleway', sans-serif;
    }

    /* ── Camera background ─────────────────────────────────── */
    #camera-bg {
      position: fixed; inset: 0;
      object-fit: cover;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── Overlay darkener so hologram pops ────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 1;
    }

    /* ── Scene container ───────────────────────────────────── */
    #scene {
      position: fixed; inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 5vh;
    }

    /* ── Hologram video ────────────────────────────────────── */
    #hologram-wrap {
      position: relative;
      width: min(380px, 80vw);
      flex-shrink: 0;
      display: flex;
      justify-content: center;
    }

    #holo-video {
      width: 100%;
      display: block;
      mix-blend-mode: screen;   /* removes black → person floats */
      filter:
        drop-shadow(0 0 12px var(--gold-glow))
        drop-shadow(0 0 30px var(--gold-glow))
        drop-shadow(0 0 60px rgba(255,200,0,0.3))
        saturate(0.82) sepia(0.22) hue-rotate(5deg) brightness(1.08);
      animation: holoFlicker 6s infinite;
    }

    @keyframes holoFlicker {
      0%,100% { opacity:1; filter: drop-shadow(0 0 12px var(--gold-glow)) drop-shadow(0 0 32px var(--gold-glow)) saturate(0.82) sepia(0.22) brightness(1.08); }
      7%  { opacity:.92; }
      8%  { opacity:1; }
      45% { opacity:1; filter: drop-shadow(0 0 18px var(--gold-glow)) drop-shadow(0 0 50px rgba(255,215,0,0.5)) saturate(0.9) sepia(0.3) brightness(1.15); }
      46% { opacity:.88; }
      47% { opacity:1; }
    }

    /* Scanlines on the video */
    #hologram-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(255,215,0,0.04) 3px,
        rgba(255,215,0,0.04) 4px
      );
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    /* ── Ground glow ring ──────────────────────────────────── */
    #ground-glow {
      width: min(340px, 75vw);
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(255,215,0,0.45) 0%, transparent 70%);
      margin-top: -10px;
      flex-shrink: 0;
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { opacity:.7; transform: scaleX(1); }
      50%      { opacity:1;  transform: scaleX(1.08); }
    }

    /* ── Info card ─────────────────────────────────────────── */
    #info-card {
      margin-top: 14px;
      text-align: center;
      flex-shrink: 0;
    }

    #info-card .name {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow:
        0 0 8px var(--gold-glow),
        0 0 20px var(--gold-glow),
        0 0 40px rgba(255,180,0,0.4);
      animation: nameFlicker 8s infinite;
    }
    @keyframes nameFlicker {
      0%,100% { opacity:1; }
      50%      { opacity:.9; text-shadow: 0 0 14px var(--gold-glow), 0 0 30px var(--gold-glow); }
    }

    #info-card .tagline {
      margin-top: 4px;
      font-size: clamp(0.7rem, 2.5vw, 0.85rem);
      font-weight: 200;
      letter-spacing: 0.35em;
      color: rgba(255,215,0,0.65);
      text-transform: uppercase;
    }

    /* ── Divider line ──────────────────────────────────────── */
    .divider {
      width: min(260px, 60vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 12px auto;
      opacity: 0.5;
    }

    /* ── Buttons ───────────────────────────────────────────── */
    #buttons {
      display: flex;
      gap: 14px;
      margin-top: 6px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      flex-shrink: 0;
    }
    #buttons.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 4px;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.65rem, 2.5vw, 0.78rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1.5px solid var(--gold);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .btn:hover::before { opacity: 0.12; }
    .btn:active { transform: scale(0.96); }

    .btn-site {
      background: rgba(255,215,0,0.08);
      color: var(--gold);
      box-shadow: 0 0 14px rgba(255,215,0,0.25), inset 0 0 10px rgba(255,215,0,0.05);
    }
    .btn-site:hover {
      box-shadow: 0 0 24px rgba(255,215,0,0.45), inset 0 0 14px rgba(255,215,0,0.1);
    }

    .btn-whatsapp {
      background: rgba(37,211,102,0.12);
      color: #4dff91;
      border-color: #25d366;
      box-shadow: 0 0 14px rgba(37,211,102,0.2), inset 0 0 10px rgba(37,211,102,0.05);
    }
    .btn-whatsapp:hover {
      box-shadow: 0 0 24px rgba(37,211,102,0.4), inset 0 0 14px rgba(37,211,102,0.1);
    }

    .btn svg { flex-shrink: 0; }

    /* ── Corner decorations ────────────────────────────────── */
    .corner {
      position: fixed;
      width: 36px; height: 36px;
      z-index: 3;
      opacity: 0.5;
    }
    .corner--tl { top: 16px; left: 16px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .corner--tr { top: 16px; right: 16px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
    .corner--bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .corner--br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

    /* ── Particle canvas ───────────────────────────────────── */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Permission screen ─────────────────────────────────── */
    #permission-screen {
      position: fixed; inset: 0;
      background: #000;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
      text-align: center;
    }
    #permission-screen .logo {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold-glow);
      letter-spacing: 0.15em;
    }
    #permission-screen p {
      color: rgba(255,215,0,0.6);
      font-size: 0.9rem;
      line-height: 1.7;
      letter-spacing: 0.05em;
    }
    #start-btn {
      padding: 14px 36px;
      border: 1.5px solid var(--gold);
      background: rgba(255,215,0,0.08);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(255,215,0,0.3);
      transition: all 0.3s;
    }
    #start-btn:hover { box-shadow: 0 0 30px rgba(255,215,0,0.5); background: rgba(255,215,0,0.15); }
  </style>
</head>
<body>

<!-- Permission/Start screen -->
<div id="permission-screen">
  <div class="logo">EDSON NEIVA</div>
  <p>Toque para activar a câmera<br>e ver o holograma em realidade aumentada</p>
  <button id="start-btn">✦ Activar Holograma ✦</button>
</div>

<!-- Camera feed -->
<video id="camera-bg" autoplay playsinline muted></video>

<!-- Dark overlay -->
<div id="overlay"></div>

<!-- Particle canvas -->
<canvas id="particles"></canvas>

<!-- Corner decorations -->
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<!-- Main scene -->
<div id="scene">
  <div id="hologram-wrap">
    <video id="holo-video" playsinline loop muted>
      <source src="edson_video.mp4" type="video/mp4" />
    </video>
  </div>

  <div id="ground-glow"></div>

  <div id="info-card">
    <div class="name">Edson Neiva</div>
    <div class="tagline">Top New Europa</div>
  </div>

  <div class="divider"></div>

  <div id="buttons">
    <!-- Site button -->
    <a class="btn btn-site" href="https://topneweuropa.com/" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      Site
    </a>

    <!-- WhatsApp button -->
    <a class="btn btn-whatsapp" href="https://wa.me/351918705970" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
      </svg>
      WhatsApp
    </a>
  </div>
</div>

<script>
  const permissionScreen = document.getElementById('permission-screen');
  const startBtn         = document.getElementById('start-btn');
  const cameraBg         = document.getElementById('camera-bg');
  const holoVideo        = document.getElementById('holo-video');
  const buttonsEl        = document.getElementById('buttons');
  const canvas           = document.getElementById('particles');
  const ctx              = canvas.getContext('2d');

  // ── Particles ──────────────────────────────────────────────
  let particles = [];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function spawnParticle() {
    const x = window.innerWidth * (0.2 + Math.random() * 0.6);
    const y = window.innerHeight * 0.9;
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 0.6,
      vy: -(0.6 + Math.random() * 1.2),
      life: 1,
      decay: 0.008 + Math.random() * 0.008,
      r: 1 + Math.random() * 2
    });
  }

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (Math.random() < 0.35) spawnParticle();

    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.life -= p.decay;

      const alpha = p.life * 0.8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,215,0,${alpha})`;
      ctx.shadowBlur = 6;
      ctx.shadowColor = `rgba(255,200,0,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  // ── Start: camera + hologram ────────────────────────────────
  startBtn.addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      cameraBg.srcObject = stream;
      await cameraBg.play();
    } catch (e) {
      // Camera denied — dark background is fine too
      console.warn('Camera unavailable, using dark background.', e);
    }

    permissionScreen.style.transition = 'opacity 0.6s';
    permissionScreen.style.opacity    = '0';
    setTimeout(() => permissionScreen.style.display = 'none', 600);

    // Play hologram video
    holoVideo.play().catch(() => {});

    // Show buttons at end of video
    holoVideo.addEventListener('timeupdate', () => {
      const remaining = holoVideo.duration - holoVideo.currentTime;
      if (remaining <= 3 && !buttonsEl.classList.contains('visible')) {
        buttonsEl.classList.add('visible');
      }
    });

    // If video duration is very short or unknown, show buttons after 16s anyway
    setTimeout(() => buttonsEl.classList.add('visible'), 16000);
  });
</script>
</body>
</html>
